<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAS Boutique - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Montserrat:wght@400;700&display=swap');
        
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-lato { font-family: 'Lato', sans-serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        
        /* Toast Animation */
        @keyframes toastSlide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: toastSlide 0.3s ease-out; }
        
        /* Gold Gradient Text */
        .text-gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Glass Effect */
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        /* Input Focus Ring */
        .input-focus:focus { outline: none; box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.5); border-color: #fbbf24; }
        
        /* Button Hover Lift */
        .btn-lift { transition: all 0.2s ease; }
        .btn-lift:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(236, 72, 153, 0.5); }
        
        /* Image Upload Zone */
        .upload-zone { border: 2px dashed #3f3f46; transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .upload-zone.dragover { border-color: #ec4899; background: rgba(236, 72, 153, 0.1); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        was: {
                            black: '#0a0a0a',
                            gold: '#fbbf24',
                            pink: '#ec4899',
                            white: '#fafafa'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-lato antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // ==========================================
        // ICONS COMPONENT (Lucide replacement)
        // ==========================================
        const Icons = {
            X: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            ),
            Lock: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
            ),
            Package: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
                    <path d="m3.3 7 8.7 5 8.7-5" />
                    <path d="M12 22V12" />
                </svg>
            ),
            Grid3X3: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
            ),
            Star: ({ className, fill }) => (
                <svg className={className} fill={fill || "none"} stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
            ),
            Settings: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            ),
            CreditCard: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <rect x="2" y="5" width="20" height="14" rx="2" />
                    <line x1="2" y1="10" x2="22" y2="10" />
                </svg>
            ),
            LogOut: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            ),
            Plus: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            ),
            Trash2: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M3 6h18" />
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                </svg>
            ),
            Edit2: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />
                </svg>
            ),
            Upload: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
            ),
            Check: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            ),
            Eye: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            ),
            EyeOff: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                    <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                    <line x1="2" y1="2" x2="22" y2="22" />
                </svg>
            ),
            Search: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
            ),
            Filter: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                </svg>
            ),
            ChevronDown: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
            ),
            Image: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="9" cy="9" r="2" />
                    <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                </svg>
            ),
            DollarSign: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <line x1="12" y1="1" x2="12" y2="23" />
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
            ),
            Hash: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <line x1="4" y1="9" x2="20" y2="9" />
                    <line x1="4" y1="15" x2="20" y2="15" />
                    <line x1="10" y1="3" x2="8" y2="21" />
                    <line x1="16" y1="3" x2="14" y2="21" />
                </svg>
            ),
            AlertCircle: ({ className }) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
            )
        };

        // ==========================================
        // TOAST SYSTEM
        // ==========================================
        const ToastContext = createContext(null);

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const toast = ({ title, description, variant = 'default', duration = 3000 }) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, title, description, variant }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, duration);
            };

            return (
                <ToastContext.Provider value={{ toast }}>
                    {children}
                    <div className="fixed top-4 right-4 z-[9999] space-y-2">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-enter glass border rounded-lg p-4 min-w-[300px] shadow-2xl ${
                                t.variant === 'destructive' ? 'border-red-500/50 bg-red-950/50' : 'border-amber-500/50 bg-zinc-900/90'
                            }`}>
                                <h4 className={`font-bold ${t.variant === 'destructive' ? 'text-red-400' : 'text-amber-400'}`}>{t.title}</h4>
                                <p className="text-sm text-zinc-300 mt-1">{t.description}</p>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => useContext(ToastContext);

        // ==========================================
        // ADMIN CONTEXT / STORE
        // ==========================================
        const AdminContext = createContext(null);

        const AdminProvider = ({ children }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return localStorage.getItem('admin_auth') === 'true';
            });
            
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('was_products');
                return saved ? JSON.parse(saved) : [
                    {
                        id: '1',
                        name: 'Designer Handbag',
                        sku: 'BG001',
                        price: 299.99,
                        description: 'Luxury leather handbag with gold accents',
                        categoryId: '1',
                        images: ['https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400&h=400&fit=crop'],
                        stock: 15,
                        featured: true
                    },
                    {
                        id: '2',
                        name: 'Silk Scarf',
                        sku: 'SC001',
                        price: 89.99,
                        description: 'Premium silk scarf with floral pattern',
                        categoryId: '2',
                        images: ['https://images.unsplash.com/photo-1584030373081-f37b7bb4fa33?w=400&h=400&fit=crop'],
                        stock: 30,
                        featured: false
                    }
                ];
            });

            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('was_categories');
                return saved ? JSON.parse(saved) : [
                    {
                        id: '1',
                        name: 'Handbags',
                        image: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&h=400&fit=crop',
                        description: 'Luxury handbags and purses',
                        productCount: 1
                    },
                    {
                        id: '2',
                        name: 'Accessories',
                        image: 'https://images.unsplash.com/photo-1611085583191-a3b181a88401?w=400&h=400&fit=crop',
                        description: 'Scarves, belts, and more',
                        productCount: 1
                    }
                ];
            });

            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('was_settings');
                return saved ? JSON.parse(saved) : {
                    storeName: 'WAS Boutique',
                    storeEmail: 'contact@wasboutique.com',
                    storePhone: '+1 (555) 123-4567',
                    storeAddress: '123 Fashion Ave, New York, NY 10001',
                    squareEnvironment: 'sandbox',
                    squareApplicationId: 'sq0idp-sandbox',
                    squareLocationId: 'L-sandbox'
                };
            });

            // Persist to localStorage
            useEffect(() => {
                localStorage.setItem('was_products', JSON.stringify(products));
            }, [products]);

            useEffect(() => {
                localStorage.setItem('was_categories', JSON.stringify(categories));
            }, [categories]);

            useEffect(() => {
                localStorage.setItem('was_settings', JSON.stringify(settings));
            }, [settings]);

            const login = (password) => {
                if (password === 'admin123') {
                    setIsAuthenticated(true);
                    localStorage.setItem('admin_auth', 'true');
                    return true;
                }
                return false;
            };

            const logout = () => {
                setIsAuthenticated(false);
                localStorage.removeItem('admin_auth');
            };

            const addProduct = (product) => {
                const newProduct = { ...product, id: Date.now().toString() };
                setProducts(prev => [...prev, newProduct]);
                // Update category count
                setCategories(prev => prev.map(cat => 
                    cat.id === product.categoryId 
                        ? { ...cat, productCount: cat.productCount + 1 }
                        : cat
                ));
                return newProduct;
            };

            const updateProduct = (id, updates) => {
                const oldProduct = products.find(p => p.id === id);
                setProducts(prev => prev.map(p => p.id === id ? { ...p, ...updates } : p));
                
                // Update category counts if category changed
                if (updates.categoryId && oldProduct && oldProduct.categoryId !== updates.categoryId) {
                    setCategories(prev => prev.map(cat => {
                        if (cat.id === oldProduct.categoryId) return { ...cat, productCount: Math.max(0, cat.productCount - 1) };
                        if (cat.id === updates.categoryId) return { ...cat, productCount: cat.productCount + 1 };
                        return cat;
                    }));
                }
            };

            const deleteProduct = (id) => {
                const product = products.find(p => p.id === id);
                setProducts(prev => prev.filter(p => p.id !== id));
                if (product) {
                    setCategories(prev => prev.map(cat => 
                        cat.id === product.categoryId 
                            ? { ...cat, productCount: Math.max(0, cat.productCount - 1) }
                            : cat
                    ));
                }
            };

            const addCategory = (category) => {
                const newCategory = { ...category, id: Date.now().toString(), productCount: 0 };
                setCategories(prev => [...prev, newCategory]);
                return newCategory;
            };

            const updateCategory = (id, updates) => {
                setCategories(prev => prev.map(c => c.id === id ? { ...c, ...updates } : c));
            };

            const deleteCategory = (id) => {
                setCategories(prev => prev.filter(c => c.id !== id));
                setProducts(prev => prev.map(p => p.categoryId === id ? { ...p, categoryId: '' } : p));
            };

            const updateSettings = (newSettings) => {
                setSettings(prev => ({ ...prev, ...newSettings }));
            };

            const toggleFeatured = (productId) => {
                setProducts(prev => prev.map(p => 
                    p.id === productId ? { ...p, featured: !p.featured } : p
                ));
            };

            return (
                <AdminContext.Provider value={{
                    isAuthenticated,
                    login,
                    logout,
                    products,
                    categories,
                    settings,
                    addProduct,
                    updateProduct,
                    deleteProduct,
                    addCategory,
                    updateCategory,
                    deleteCategory,
                    updateSettings,
                    toggleFeatured
                }}>
                    {children}
                </AdminContext.Provider>
            );
        };

        const useAdmin = () => useContext(AdminContext);

        // ==========================================
        // UI COMPONENTS
        // ==========================================
        const Button = ({ children, onClick, type = 'button', variant = 'primary', className = '', disabled = false }) => {
            const baseStyles = "px-4 py-2 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-pink-600 hover:bg-pink-700 text-white btn-lift shadow-lg shadow-pink-600/25",
                secondary: "bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700",
                outline: "border-2 border-amber-500/50 text-amber-400 hover:bg-amber-500/10",
                ghost: "text-zinc-400 hover:text-white hover:bg-zinc-800",
                danger: "bg-red-600/20 hover:bg-red-600/30 text-red-400 border border-red-600/50"
            };
            
            return (
                <button 
                    type={type} 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`${baseStyles} ${variants[variant]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const Input = ({ value, onChange, type = 'text', placeholder, className = '', required = false, readOnly = false, min, step, accept }) => (
            <input
                type={type}
                value={value}
                onChange={onChange}
                placeholder={placeholder}
                required={required}
                readOnly={readOnly}
                min={min}
                step={step}
                accept={accept}
                className={`w-full px-4 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 input-focus transition-all ${readOnly ? 'opacity-60 cursor-not-allowed' : ''} ${className}`}
            />
        );

        const Label = ({ children, className = '' }) => (
            <label className={`block text-sm font-medium text-zinc-300 mb-1.5 ${className}`}>
                {children}
            </label>
        );

        const TextArea = ({ value, onChange, placeholder, className = '', rows = 3 }) => (
            <textarea
                value={value}
                onChange={onChange}
                placeholder={placeholder}
                rows={rows}
                className={`w-full px-4 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 input-focus transition-all resize-none ${className}`}
            />
        );

        const Select = ({ value, onChange, children, className = '' }) => (
            <select
                value={value}
                onChange={onChange}
                className={`w-full px-4 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-white input-focus transition-all appearance-none cursor-pointer ${className}`}
            >
                {children}
            </select>
        );

        const Badge = ({ children, variant = 'default' }) => {
            const variants = {
                default: "bg-zinc-800 text-zinc-300 border-zinc-700",
                success: "bg-emerald-500/20 text-emerald-400 border-emerald-500/50",
                warning: "bg-amber-500/20 text-amber-400 border-amber-500/50",
                danger: "bg-red-500/20 text-red-400 border-red-500/50",
                pink: "bg-pink-500/20 text-pink-400 border-pink-500/50"
            };
            return (
                <span className={`px-2 py-1 rounded-md text-xs font-medium border ${variants[variant]}`}>
                    {children}
                </span>
            );
        };

        // ==========================================
        // IMAGE UPLOAD COMPONENT
        // ==========================================
        const ImageUpload = ({ images, onChange, maxImages = 5 }) => {
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);

            const handleFile = (file) => {
                if (!file || !file.type.startsWith('image/')) {
                    return;
                }
                if (images.length >= maxImages) {
                    alert(`Maximum ${maxImages} images allowed`);
                    return;
                }
                
                const reader = new FileReader();
                reader.onloadend = () => {
                    onChange([...images, reader.result]);
                };
                reader.readAsDataURL(file);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                handleFile(file);
            };

            const handleInputChange = (e) => {
                const file = e.target.files[0];
                handleFile(file);
            };

            const removeImage = (index) => {
                onChange(images.filter((_, i) => i !== index));
            };

            return (
                <div className="space-y-3">
                    <div className="flex flex-wrap gap-3">
                        {images.map((img, idx) => (
                            <div key={idx} className="relative group">
                                <img 
                                    src={img} 
                                    alt="" 
                                    className="w-24 h-24 rounded-lg object-cover border border-zinc-700 group-hover:border-amber-500/50 transition-all"
                                />
                                <button
                                    type="button"
                                    onClick={() => removeImage(idx)}
                                    className="absolute -top-2 -right-2 w-6 h-6 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 transition-all transform scale-90 group-hover:scale-100"
                                >
                                    <Icons.X className="w-3 h-3" />
                                </button>
                            </div>
                        ))}
                        
                        {images.length < maxImages && (
                            <div
                                onClick={() => fileInputRef.current?.click()}
                                onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                onDragLeave={() => setIsDragging(false)}
                                onDrop={handleDrop}
                                className={`w-24 h-24 rounded-lg border-2 border-dashed flex flex-col items-center justify-center cursor-pointer transition-all ${
                                    isDragging 
                                        ? 'border-pink-500 bg-pink-500/10' 
                                        : 'border-zinc-600 hover:border-amber-500 hover:bg-amber-500/5'
                                }`}
                            >
                                <Icons.Upload className={`w-6 h-6 mb-1 ${isDragging ? 'text-pink-500' : 'text-zinc-500'}`} />

                            </div>
                        )}
                    </div>
                    <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        onChange={handleInputChange}
                        className="hidden"

                    <p className="text-xs text-zinc-500">
                        {images.length} of {maxImages} images • Drag & drop or click to upload
                    </p>

        // ==========================================
        // MODAL COMPONENTS
        // ==========================================
        const Modal = ({ isOpen, onClose, title, children, size = 'md' }) => {
            if (!isOpen) return null;
            
            const sizes = {
                sm: 'max-w-md',
                md: 'max-w-2xl',
                lg: 'max-w-4xl',
                xl: 'max-w-6xl'
            };

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">

                        <div className="flex-1 overflow-auto p-6">
                            {children}
                        </div>
                    </div>
                </div>
            );

        // ==========================================
        // PRODUCT FORM MODAL
        // ==========================================
        const ProductFormModal = ({ product, isOpen, onClose, categories }) => {
            const { addProduct, updateProduct } = useAdmin();
            const { toast } = useToast();
            
            const [formData, setFormData] = useState({
                name: '',
                sku: '',
                price: '',
                description: '',
                categoryId: categories[0]?.id || '',
                stock: '',
                images: [],
                featured: false
            });

            const [errors, setErrors] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                if (product) {
                    setFormData({
                        name: product.name,
                        sku: product.sku,
                        price: product.price.toString(),
                        description: product.description,
                        categoryId: product.categoryId,
                        stock: product.stock.toString(),
                        images: product.images,
                        featured: product.featured
                    });
                } else {
                    setFormData({
                        name: '',
                        sku: '',
                        price: '',
                        description: '',
                        categoryId: categories[0]?.id || '',
                        stock: '',
                        images: [],
                        featured: false
                    });
                }
                setErrors({});
            }, [product, isOpen, categories]);

            const validate = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = 'Product name is required';
                if (!formData.sku.trim()) newErrors.sku = 'SKU is required';
                if (!formData.price || parseFloat(formData.price) <= 0) newErrors.price = 'Valid price required';
                if (!formData.stock || parseInt(formData.stock) < 0) newErrors.stock = 'Valid stock required';
                if (formData.images.length === 0) newErrors.images = 'At least one image required';
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!validate()) return;

                setIsSubmitting(true);
                
                const data = {
                    name: formData.name.trim(),
                    sku: formData.sku.trim(),
                    price: parseFloat(formData.price),
                    description: formData.description.trim(),
                    categoryId: formData.categoryId,
                    stock: parseInt(formData.stock),
                    images: formData.images,
                    featured: formData.featured
                };

                try {
                    if (product) {
                        updateProduct(product.id, data);
                        toast({ title: 'Success', description: 'Product updated successfully' });
                    } else {
                        addProduct(data);
                        toast({ title: 'Success', description: 'Product added successfully' });
                    }
                    onClose();
                } catch (error) {
                    toast({ title: 'Error', description: 'Something went wrong', variant: 'destructive' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            const generateSKU = () => {
                const prefix = formData.name.substring(0, 3).toUpperCase();
                const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                setFormData({ ...formData, sku: `${prefix}${random}` });
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={product ? 'Edit Product' : 'Add New Product'} size="lg">
                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-4">
                                <div>
                                    <Label>Product Name *</Label>
                                    <Input 
                                        value={formData.name} 
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        placeholder="e.g., Designer Leather Handbag"
                                        required
                                    />
                                    {errors.name && <p className="text-red-400 text-xs mt-1">{errors.name}</p>}
                                </div>

                                <div>
                                    <Label>SKU *</Label>
                                    <div className="flex gap-2">
                                        <Input 
                                            value={formData.sku} 
                                            onChange={(e) => setFormData({...formData, sku: e.target.value})}
                                            placeholder="e.g., BG001"
                                            className="flex-1"
                                        />
                                        <Button type="button" variant="secondary" onClick={generateSKU}>
                                            <Icons.Hash className="w-4 h-4" /> Generate
                                        </Button>
                                    </div>
                                    {errors.sku && <p className="text-red-400 text-xs mt-1">{errors.sku}</p>}
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <Label>Price ($) *</Label>
                                        <div className="relative">
                                            <Icons.DollarSign className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                            <Input 
                                                type="number" 
                                                step="0.01" 
                                                min="0"
                                                value={formData.price} 
                                                onChange={(e) => setFormData({...formData, price: e.target.value})}
                                                placeholder="0.00"
                                                className="pl-10"
                                            />
                                        </div>
                                        {errors.price && <p className="text-red-400 text-xs mt-1">{errors.price}</p>}
                                    </div>
                                    <div>
                                        <Label>Stock *</Label>
                                        <Input 
                                            type="number" 
                                            min="0"
                                            value={formData.stock} 
                                            onChange={(e) => setFormData({...formData, stock: e.target.value})}
                                            placeholder="Quantity"
                                        />
                                        {errors.stock && <p className="text-red-400 text-xs mt-1">{errors.stock}</p>}
                                    </div>
                                </div>

                                <div>
                                    <Label>Category *</Label>
                                    <Select 
                                        value={formData.categoryId} 
                                        onChange={(e) => setFormData({...formData, categoryId: e.target.value})}
                                    >
                                        {categories.map(cat => (
                                            <option key={cat.id} value={cat.id}>{cat.name}</option>
                                        ))}
                                    </Select>
                                </div>

                                <div>
                                    <Label>Description</Label>
                                    <TextArea 
                                        value={formData.description} 
                                        onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        placeholder="Product description..."
                                        rows={4}
                                    />
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <Label>Product Images *</Label>
                                    <ImageUpload 
                                        images={formData.images} 
                                        onChange={(imgs) => setFormData({...formData, images: imgs})}
                                        maxImages={5}
                                    />
                                    {errors.images && <p className="text-red-400 text-xs mt-1">{errors.images}</p>}
                                </div>

                                <div className="p-4 bg-zinc-800/50 rounded-lg border border-zinc-700">
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input 
                                            type="checkbox" 
                                            checked={formData.featured}
                                            onChange={(e) => setFormData({...formData, featured: e.target.checked})}
                                            className="w-5 h-5 rounded border-zinc-600 text-pink-600 focus:ring-pink-500 bg-zinc-700"
                                        />
                                        <div>
                                            <span className="font-medium text-zinc-200">Feature on Homepage</span>
                                            <p className="text-xs text-zinc-500">This product will appear in featured section</p>
                                        </div>
                                    </label>
                                </div>

                                {formData.images.length > 0 && (
                                    <div className="p-4 bg-zinc-800/30 rounded-lg">
                                        <Label>Preview</Label>
                                        <div className="mt-2 aspect-square rounded-lg overflow-hidden bg-zinc-800">
                                            <img src={formData.images[0]} alt="Preview" className="w-full h-full object-cover" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex gap-4 pt-4 border-t border-zinc-800">
                            <Button type="button" variant="secondary" onClick={onClose} className="flex-1">
                                Cancel
                            </Button>
                            <Button type="submit" variant="primary" className="flex-1" disabled={isSubmitting}>
                                {isSubmitting ? (
                                    <span className="flex items-center gap-2">
                                        <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                        Saving...
                                    </span>
                                ) : (
                                    <>{product ? <Icons.Edit2 className="w-4 h-4" /> : <Icons.Plus className="w-4 h-4" />} {product ? 'Update' : 'Add'} Product</>
                                )}
                            </Button>
                        </div>
                    </form>
                </Modal>
            );
        };

        // ==========================================
        // CATEGORY FORM MODAL
        // ==========================================
        const CategoryFormModal = ({ category, isOpen, onClose }) => {
            const { addCategory, updateCategory } = useAdmin();
            const { toast } = useToast();
            
            const [formData, setFormData] = useState({
                name: '',
                description: '',
                image: ''
            });

            useEffect(() => {
                if (category) {
                    setFormData({
                        name: category.name,
                        description: category.description,
                        image: category.image
                    });

                    setFormData({ name: '', description: '', image: '' });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name.trim()) {
                    toast({ title: 'Error', description: 'Category name is required', variant: 'destructive' });
                    return;
                }
                if (!formData.image) {
                    toast({ title: 'Error', description: 'Category image is required', variant: 'destructive' });
                    return;
                }

                setIsSubmitting(true);
                
                const data = {
                    name: formData.name.trim(),
                    description: formData.description.trim(),
                    image: formData.image
                };

                try {
                    if (category) {
                        updateCategory(category.id, data);
                        toast({ title: 'Success', description: 'Category updated successfully' });
                    } else {
                        addCategory(data);
                        toast({ title: 'Success', description: 'Category added successfully' });
                    }
                    onClose();
                } catch (error) {
                    toast({ title: 'Error', description: 'Failed to save category', variant: 'destructive' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={category ? 'Edit Category' : 'Add New Category'} size="md">
                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div>
                            <Label>Category Name *</Label>
                            <Input 
                                value={formData.name} 
                                onChange={(e) => setFormData({...formData, name: e.target.value})}
                                placeholder="e.g., Handbags"
                                required
                            />
                        </div>

                        <div>
                            <Label>Description</Label>
                            <TextArea 
                                value={formData.description} 
                                onChange={(e) => setFormData({...formData, description: e.target.value})}
                                placeholder="Category description..."
                            />
                        </div>

                        <div>
                            <Label>Category Image *</Label>
                            <div className="mt-2">
                                {formData.image ? (
                                    <div className="relative inline-block">
                                        <img src={formData.image} alt="" className="w-32 h-32 rounded-lg object-cover border border-zinc-700" />
                                        <button
                                            type="button"
                                            onClick={() => setFormData({...formData, image: ''})}
                                            className="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center"
                                        >
                                            <Icons.X className="w-3 h-3" />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex gap-2">
                                        <input
                                            type="file"
                                            accept="image/*"
                                            onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onloadend = () => setFormData({...formData, image: reader.result});
                                                    reader.readAsDataURL(file);
                                                }
                                            }}
                                            className="hidden"
                                            id="cat-image"
                                        />
                                        <label 
                                            htmlFor="cat-image"
                                            className="flex items-center gap-2 px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-lg cursor-pointer hover:border-amber-500 hover:text-amber-500 transition-all"
                                        >
                                            <Icons.Upload className="w-5 h-5" />
                                            <span>Upload Image</span>
                                        </label>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex gap-4 pt-4 border-t border-zinc-800">
                            <Button type="button" variant="secondary" onClick={onClose} className="flex-1">
                                Cancel
                            </Button>
                            <Button type="submit" variant="primary" className="flex-1" disabled={isSubmitting}>
                                {isSubmitting ? 'Saving...' : <>{category ? 'Update' : 'Add'} Category</>}
                            </Button>
                        </div>
                    </form>
                </Modal>
            );
        };

        // ==========================================
        // DELETE CONFIRMATION MODAL
        // ==========================================
        const DeleteConfirmModal = ({ isOpen, onClose, onConfirm, title, description }) => (
            <Modal isOpen={isOpen} onClose={onClose} title="Confirm Delete" size="sm">
                <div className="space-y-4">
                    <div className="flex items-center gap-3 text-red-400">
                        <Icons.AlertCircle className="w-8 h-8" />
                        <div>
                            <h4 className="font-bold">{title}</h4>
                            <p className="text-sm text-zinc-400">{description}</p>
                        </div>
                    </div>
                    <div className="flex gap-3 pt-4">
                        <Button variant="secondary" onClick={onClose} className="flex-1">Cancel</Button>
                        <Button variant="danger" onClick={onConfirm} className="flex-1">Delete</Button>
                    </div>
                </div>
            </Modal>
        );

        // ==========================================
        // TAB COMPONENTS
        // ==========================================
        const ProductsTab = () => {
            const { products, categories, deleteProduct } = useAdmin();
            const [search, setSearch] = useState('');
            const [filterCategory, setFilterCategory] = useState('');
            const [showForm, setShowForm] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const filteredProducts = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search.toLowerCase()) || 
                                    p.sku.toLowerCase().includes(search.toLowerCase());
                const matchesCategory = !filterCategory || p.categoryId === filterCategory;
                return matchesSearch && matchesCategory;
            });

            const handleEdit = (product) => {
                setEditingProduct(product);
                setShowForm(true);
            };

            const handleAdd = () => {
                setEditingProduct(null);
                setShowForm(true);
            };

            const handleDelete = (product) => {
                setDeleteConfirm(product);
            };

            const confirmDelete = () => {
                if (deleteConfirm) {
                    deleteProduct(deleteConfirm.id);
                    setDeleteConfirm(null);
                }
            };

            const getCategoryName = (id) => categories.find(c => c.id === id)?.name || 'Uncategorized';

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-amber-500 font-playfair">Products</h2>
                            <p className="text-zinc-400 text-sm mt-1">{filteredProducts.length} of {products.length} products</p>
                        </div>
                        <Button onClick={handleAdd} variant="primary">
                            <Icons.Plus className="w-4 h-4" /> Add Product

                    </div>

                    <div className="flex flex-col md:flex-row gap-4 p-4 bg-zinc-900/50 rounded-lg border border-zinc-800">

                            <Input 
                                value={search} 
                                onChange={(e) => setSearch(e.target.value)}
                                placeholder="Search products..."
                                className="pl-10"
                            />
                        </div>
                        <div className="md:w-64">
                            <Select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)}>
                                <option value="">All Categories</option>
                                {categories.map(c => (
                                    <option key={c.id} value={c.id}>{c.name}</option>
                                ))}
                            </Select>
                        </div>
                    </div>

                        {filteredProducts.length === 0 ? (

                                <p className="text-zinc-500">No products found</p>

                                <div key={product.id} className="group flex items-center gap-4 p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-amber-500/30 transition-all hover:shadow-lg hover:shadow-amber-500/5">
                                    <div className="relative">
                                        <img src={product.images[0]} alt={product.name} className="w-20 h-20 rounded-lg object-cover bg-zinc-800" />
                                        {product.featured && (
                                            <div className="absolute -top-2 -left-2 w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center shadow-lg">
                                                <Icons.Star className="w-3 h-3 text-black fill-black" />
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 mb-1">
                                            <h3 className="font-bold text-zinc-100 truncate">{product.name}</h3>
                                            <Badge variant={product.stock > 10 ? 'success' : product.stock > 0 ? 'warning' : 'danger'}>
                                                {product.stock > 10 ? 'In Stock' : product.stock > 0 ? 'Low Stock' : 'Out of Stock'}

                                        <div className="flex items-center gap-4 text-sm text-zinc-500">
                                            <span className="font-mono text-xs bg-zinc-800 px-2 py-1 rounded">{product.sku}</span>
                                            <span className="text-amber-500 font-medium">${product.price.toFixed(2)}</span>

                                            <span>{getCategoryName(product.categoryId)}</span>

                                            <Icons.Trash2 className="w-4 h-4" />
                                        </Button>
                                    </div>
                                </div>
                            ))

                    </div>

                    <ProductFormModal 
                        product={editingProduct} 
                        isOpen={showForm} 
                        onClose={() => setShowForm(false)} 
                        categories={categories}
                    />

                    <DeleteConfirmModal
                        isOpen={!!deleteConfirm}
                        onClose={() => setDeleteConfirm(null)}
                        onConfirm={confirmDelete}
                        title="Delete Product"
                        description={`Are you sure you want to delete "${deleteConfirm?.name}"? This action cannot be undone.`}
                    />
                </div>

        };

            const [showForm, setShowForm] = useState(false);

            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const handleEdit = (cat) => {
                setEditingCategory(cat);
                setShowForm(true);

                setEditingCategory(null);
                setShowForm(true);
            };

                setDeleteConfirm(cat);
            };

                if (deleteConfirm) {
                    deleteCategory(deleteConfirm.id);
                    setDeleteConfirm(null);
                }

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex items-center justify-between">

                            <h2 className="text-2xl font-bold text-amber-500 font-playfair">Categories</h2>

                                <div className="aspect-video relative overflow-hidden">

                                        <p className="text-sm text-zinc-400">{category.productCount} products</p>

                        <button

                            <div className="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center">
                                <Icons.Plus className="w-6 h-6" />
