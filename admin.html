                            <span className="font-medium">Add New Category</span>
                        </button>
                    </div>

                    <CategoryFormModal 
                        category={editingCategory} 
                        isOpen={showForm} 
                        onClose={() => setShowForm(false)} 
                    />

                    <DeleteConfirmModal
                        isOpen={!!deleteConfirm}
                        onClose={() => setDeleteConfirm(null)}
                        onConfirm={confirmDelete}
                        title="Delete Category"
                        description={`Are you sure you want to delete "${deleteConfirm?.name}"? All products in this category will become uncategorized.`}
                    />
                </div>
            );
        };

        const FeaturedTab = () => {
            const { products, toggleFeatured } = useAdmin();
            const { toast } = useToast();
            
            const featured = products.filter(p => p.featured);
            const regular = products.filter(p => !p.featured);

            const handleToggle = (product) => {
                toggleFeatured(product.id);
                toast({ 
                    title: product.featured ? 'Removed from Featured' : 'Added to Featured',
                    description: `"${product.name}" has been ${product.featured ? 'removed from' : 'added to'} the homepage.`
                });
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div>
                        <h2 className="text-2xl font-bold text-amber-500 font-playfair">Featured Products</h2>
                        <p className="text-zinc-400 text-sm mt-1">{featured.length} products featured on homepage</p>
                    </div>

                    {featured.length > 0 && (
                        <div className="space-y-3">
                            <h3 className="text-sm font-medium text-zinc-500 uppercase tracking-wider">Currently Featured</h3>
                            <div className="grid gap-3">
                                {featured.map(product => (
                                    <div key={product.id} className="flex items-center gap-4 p-4 bg-amber-500/10 border border-amber-500/30 rounded-xl">
                                        <img src={product.images[0]} alt={product.name} className="w-16 h-16 rounded-lg object-cover" />
                                        <div className="flex-1">
                                            <h4 className="font-bold text-amber-500">{product.name}</h4>
                                            <p className="text-sm text-zinc-400">${product.price.toFixed(2)}</p>
                                        </div>
                                        <Button variant="outline" onClick={() => handleToggle(product)}>
                                            <Icons.Star className="w-4 h-4 fill-amber-500 text-amber-500" /> Unfeature
                                        </Button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="space-y-3">
                        <h3 className="text-sm font-medium text-zinc-500 uppercase tracking-wider">Available Products</h3>
                        <div className="grid gap-3">
                            {regular.map(product => (
                                <div key={product.id} className="flex items-center gap-4 p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-zinc-700 transition-all">
                                    <img src={product.images[0]} alt={product.name} className="w-16 h-16 rounded-lg object-cover bg-zinc-800" />
                                    <div className="flex-1">
                                        <h4 className="font-bold text-zinc-200">{product.name}</h4>
                                        <p className="text-sm text-zinc-500">${product.price.toFixed(2)}</p>
                                    </div>
                                    <Button variant="secondary" onClick={() => handleToggle(product)}>
                                        <Icons.Star className="w-4 h-4" /> Feature
                                    </Button>
                                </div>
                            ))}
                        </div>
                        {regular.length === 0 && (
                            <p className="text-center text-zinc-500 py-8">All products are featured!</p>
                        )}
                    </div>
                </div>
            );
        };

        const SquareTab = () => {
            const { settings, updateSettings } = useAdmin();
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState(settings);

            const handleSave = () => {
                updateSettings(formData);
                setIsEditing(false);
            };

            return (
                <div className="space-y-6 animate-fade-in max-w-2xl">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-amber-500 font-playfair">Square Integration</h2>
                            <p className="text-zinc-400 text-sm mt-1">Payment processing settings</p>
                        </div>
                        <Button variant={isEditing ? "secondary" : "primary"} onClick={() => isEditing ? handleSave() : setIsEditing(true)}>
                            {isEditing ? <><Icons.Check className="w-4 h-4" /> Save</> : <><Icons.Edit2 className="w-4 h-4" /> Edit</>}
                        </Button>
                    </div>

                    <div className="space-y-4 p-6 bg-zinc-900 border border-zinc-800 rounded-xl">
                        <div className="flex items-center gap-3 mb-6 pb-6 border-b border-zinc-800">
                            <div className="w-12 h-12 bg-white rounded-lg flex items-center justify-center">
                                <Icons.CreditCard className="w-6 h-6 text-black" />
                            </div>
                            <div>
                                <h3 className="font-bold text-white">Square {settings.squareEnvironment === 'production' ? 'Production' : 'Sandbox'}</h3>
                                <p className="text-sm text-zinc-500">
                                    {settings.squareEnvironment === 'production' ? 'Live payments enabled' : 'Test environment - no real charges'}
                                </p>
                            </div>
                            <Badge variant={settings.squareEnvironment === 'production' ? 'success' : 'warning'} className="ml-auto">
                                {settings.squareEnvironment}
                            </Badge>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <Label>Environment</Label>
                                {isEditing ? (
                                    <Select 
                                        value={formData.squareEnvironment} 
                                        onChange={(e) => setFormData({...formData, squareEnvironment: e.target.value})}
                                    >
                                        <option value="sandbox">Sandbox (Testing)</option>
                                        <option value="production">Production (Live)</option>
                                    </Select>
                                ) : (
                                    <Input value={settings.squareEnvironment} readOnly />
                                )}
                            </div>

                            <div>
                                <Label>Application ID</Label>
                                <Input 
                                    value={isEditing ? formData.squareApplicationId : settings.squareApplicationId} 
                                    onChange={(e) => setFormData({...formData, squareApplicationId: e.target.value})}
                                    readOnly={!isEditing}
                                    className="font-mono text-sm"
                                />
                            </div>

                            <div>
                                <Label>Location ID</Label>
                                <Input 
                                    value={isEditing ? formData.squareLocationId : settings.squareLocationId} 
                                    onChange={(e) => setFormData({...formData, squareLocationId: e.target.value})}
                                    readOnly={!isEditing}
                                    className="font-mono text-sm"
                                />
                            </div>
                        </div>

                        <div className="mt-6 p-4 bg-amber-500/10 border border-amber-500/20 rounded-lg">
                            <p className="text-sm text-amber-400 flex items-start gap-2">
                                <Icons.AlertCircle className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <span>
                                    {settings.squareEnvironment === 'sandbox' 
                                        ? 'You are in sandbox mode. No real payments will be processed. Use test card numbers for transactions.' 
                                        : 'You are in production mode. Real payments will be processed. Ensure your Square account is fully activated.'}
                                </span>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsTab = () => {
            const { settings, updateSettings } = useAdmin();
            const { toast } = useToast();
            const [formData, setFormData] = useState(settings);
            const [hasChanges, setHasChanges] = useState(false);

            useEffect(() => {
                setFormData(settings);
            }, [settings]);

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
                setHasChanges(true);
            };

            const handleSave = () => {
                updateSettings(formData);
                setHasChanges(false);
                toast({ title: 'Settings Saved', description: 'Your changes have been saved successfully.' });
            };

            return (
                <div className="space-y-6 animate-fade-in max-w-2xl">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-amber-500 font-playfair">Site Settings</h2>
                            <p className="text-zinc-400 text-sm mt-1">Manage your store information</p>
                        </div>
                        {hasChanges && (
                            <Button variant="primary" onClick={handleSave}>
                                <Icons.Check className="w-4 h-4" /> Save Changes
                            </Button>
                        )}
                    </div>

                    <div className="space-y-6 p-6 bg-zinc-900 border border-zinc-800 rounded-xl">
                        <div className="flex items-center gap-4 pb-6 border-b border-zinc-800">
                            <div className="w-16 h-16 bg-gradient-to-br from-amber-500 to-pink-500 rounded-xl flex items-center justify-center text-2xl font-bold text-white">
                                {formData.storeName.charAt(0)}
                            </div>
                            <div>
                                <h3 className="font-bold text-lg text-white">{formData.storeName}</h3>
                                <p className="text-sm text-zinc-500">{formData.storeEmail}</p>
                            </div>
                        </div>

                        <div className="grid gap-4">
                            <div>
                                <Label>Store Name</Label>
                                <Input 
                                    value={formData.storeName} 
                                    onChange={(e) => handleChange('storeName', e.target.value)}
                                    placeholder="Your store name"
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <Label>Store Email</Label>
                                    <Input 
                                        type="email"
                                        value={formData.storeEmail} 
                                        onChange={(e) => handleChange('storeEmail', e.target.value)}
                                        placeholder="contact@yourstore.com"
                                    />
                                </div>
                                <div>
                                    <Label>Store Phone</Label>
                                    <Input 
                                        value={formData.storePhone} 
                                        onChange={(e) => handleChange('storePhone', e.target.value)}
                                        placeholder="+1 (555) 000-0000"
                                    />
                                </div>
                            </div>

                            <div>
                                <Label>Store Address</Label>
                                <TextArea 
                                    value={formData.storeAddress} 
                                    onChange={(e) => handleChange('storeAddress', e.target.value)}
                                    placeholder="Full address..."
                                    rows={2}
                                />
                            </div>
                        </div>

                        {hasChanges && (
                            <div className="flex items-center gap-2 text-amber-400 text-sm p-3 bg-amber-500/10 rounded-lg">
                                <Icons.AlertCircle className="w-4 h-4" />
                                <span>You have unsaved changes</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // MAIN ADMIN PANEL COMPONENT
        // ==========================================
        const AdminPanel = () => {
            const { isAuthenticated, login, logout } = useAdmin();
            const { toast } = useToast();
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [activeTab, setActiveTab] = useState('products');
            const [isLoading, setIsLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                
                // Simulate network delay
                await new Promise(r => setTimeout(r, 500));
                
                if (login(password)) {
                    toast({ title: 'Welcome Back', description: 'You are now logged in to the admin panel.' });
                    setPassword('');
                } else {
                    toast({ title: 'Access Denied', description: 'Invalid password. Try "admin123"', variant: 'destructive' });
                }
                setIsLoading(false);
            };

            const handleLogout = () => {
                logout();
                toast({ title: 'Logged Out', description: 'You have been successfully logged out.' });
            };

            // Keyboard shortcut to close
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && isAuthenticated) {
                        // Optional: close panel on escape
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isAuthenticated]);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-zinc-950 relative overflow-hidden">
                        {/* Background Effects */}
                        <div className="absolute inset-0 overflow-hidden">
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl animate-pulse" />
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl animate-pulse delay-1000" />
                        </div>

                        <div className="relative w-full max-w-md p-8 mx-4 glass rounded-2xl border border-zinc-800 shadow-2xl animate-fade-in">
                            <div className="text-center mb-8">
                                <div className="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-amber-500 to-pink-600 flex items-center justify-center shadow-lg shadow-pink-600/25">
                                    <Icons.Lock className="w-10 h-10 text-white" />
                                </div>
                                <h1 className="text-3xl font-bold text-gold-gradient font-playfair mb-2">Admin Access</h1>
                                <p className="text-zinc-400">Enter your credentials to continue</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <Label>Password</Label>
                                    <div className="relative mt-1.5">
                                        <Icons.Lock className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500" />
                                        <input
                                            type={showPassword ? 'text' : 'password'}
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="Enter password"
                                            className="w-full pl-12 pr-12 py-3 bg-zinc-900 border border-zinc-700 rounded-xl text-white placeholder-zinc-500 input-focus transition-all"
                                            autoFocus
                                        />
                                        <button
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 transition-colors"
                                        >
                                            {showPassword ? <Icons.EyeOff className="w-5 h-5" /> : <Icons.Eye className="w-5 h-5" />}
                                        </button>
                                    </div>
                                    <p className="text-xs text-zinc-600 mt-2">Default password: admin123</p>
                                </div>

                                <Button 
                                    type="submit" 
                                    variant="primary" 
                                    className="w-full py-3 text-lg"
                                    disabled={isLoading}
                                >
                                    {isLoading ? (
                                        <span className="flex items-center gap-2">
                                            <span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                            Verifying...
                                        </span>
                                    ) : (
                                        <>Login to Dashboard</>
                                    )}
                                </Button>
                            </form>

                            <div className="mt-6 text-center">
                                <a href="index.html" className="text-sm text-zinc-500 hover:text-amber-500 transition-colors">
                                    ← Back to Store
                                </a>
                            </div>
                        </div>
                    </div>
                );
            }

            const tabs = [
                { id: 'products', label: 'Products', icon: Icons.Package },
                { id: 'categories', label: 'Categories', icon: Icons.Grid3X3 },
                { id: 'featured', label: 'Featured', icon: Icons.Star },
                { id: 'square', label: 'Payments', icon: Icons.CreditCard },
                { id: 'settings', label: 'Settings', icon: Icons.Settings },
            ];

            const TabContent = {
                products: ProductsTab,
                categories: CategoriesTab,
                featured: FeaturedTab,
                square: SquareTab,
                settings: SettingsTab
            }[activeTab];

            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col">
                    {/* Header */}
                    <header className="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center justify-between px-4 md:px-6 sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-pink-600 flex items-center justify-center">
                                <Icons.Package className="w-5 h-5 text-white" />
                            </div>
                            <div className="hidden md:block">
                                <h1 className="font-bold text-amber-500 font-playfair">WAS Boutique</h1>
                                <p className="text-xs text-zinc-500">Admin Panel</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 md:gap-4">
                            <a 
                                href="index.html" 
                                target="_blank"
                                className="hidden md:flex items-center gap-2 px-4 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-lg transition-all"
                            >
                                <Icons.Eye className="w-4 h-4" /> View Store
                            </a>
                            <div className="h-6 w-px bg-zinc-800 hidden md:block" />
                            <Button variant="ghost" onClick={handleLogout} className="text-zinc-400 hover:text-red-400">
                                <Icons.LogOut className="w-5 h-5" />
                                <span className="hidden md:inline ml-2">Logout</span>
                            </Button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-64 bg-zinc-900 border-r border-zinc-800 hidden md:flex flex-col">
                            <nav className="flex-1 p-4 space-y-1">
                                {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group ${
                                            activeTab === tab.id 
                                                ? 'bg-pink-600 text-white shadow-lg shadow-pink-600/25' 
                                                : 'text-zinc-400 hover:bg-zinc-800 hover:text-white'
                                        }`}
                                    >
                                        <tab.icon className={`w-5 h-5 ${activeTab === tab.id ? 'text-white' : 'text-zinc-500 group-hover:text-white'}`} />
                                        <span className="font-medium">{tab.label}</span>
                                        {tab.id === 'products' && (
                                            <span className="ml-auto text-xs bg-white/20 px-2 py-0.5 rounded-full">
                                                {useAdmin().products.length}
                                            </span>
                                        )}
                                    </button>
                                ))}
                            </nav>
                            
                            <div className="p-4 border-t border-zinc-800">
                                <div className="p-4 bg-zinc-800/50 rounded-xl">
                                    <p className="text-xs text-zinc-500 mb-1">Logged in as</p>
                                    <p className="text-sm font-medium text-zinc-300">Administrator</p>
                                </div>
                            </div>
                        </aside>

                        {/* Mobile Nav */}
                        <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-50 px-2 py-2">
                            <div className="flex justify-around">
                                {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex flex-col items-center gap-1 p-2 rounded-lg transition-colors ${
                                            activeTab === tab.id ? 'text-pink-500' : 'text-zinc-500'
                                        }`}
                                    >
                                        <tab.icon className="w-5 h-5" />
                                        <span className="text-[10px] font-medium">{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </nav>

                        {/* Main Content */}
                        <main className="flex-1 overflow-auto p-4 md:p-8 pb-24 md:pb-8">
                            <div className="max-w-6xl mx-auto">
                                <TabContent />
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        // ==========================================
        // APP ROOT
        // ==========================================
        const App = () => (
            <ToastProvider>
                <AdminProvider>
                    <AdminPanel />
                </AdminProvider>
            </ToastProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
